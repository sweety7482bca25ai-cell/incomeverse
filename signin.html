<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IncomeVerse | Join Now</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #c0d6ff, #eef3f8);
}
.topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
 padding: 16px 5%;
  background: rgb(0, 0, 0);
  border-bottom: 1px solid rgba(255, 255, 255, 0.12);
}
.logo {
  font-size: 26px;
  font-weight: 800;
  color: #ffffff;
  text-decoration: none;
  display: inline-flex;
  align-items: center;
}
.logo i { color: #2d7dff; margin-right: 8px; }

.home-link {
  color: #fff;
  text-decoration: none;
  font-size: 14px;
}
.main-box {
  width: 900px;
  height: 520px;
  display: flex;
  border-radius: 25px;
  overflow: hidden;
  box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);

  margin: 80px auto;
}
.left {
  width: 45%;
  padding: 40px;
  background: linear-gradient(135deg, #3b82f6, #60a5fa);
  color: white;
}

.left .logo {
  border: 1px solid rgba(255,255,255,0.5);
  display: inline-block;
  padding: 6px 15px;
  border-radius: 20px;
  margin-bottom: 20px;
}

h2 {
  margin: 10px 0;
  font-size: 28px;
}

p {
  color: #e0e7ff;
  font-size: 14px;
}

.input-box {
  margin: 15px 0;
}

input, select {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 20px;
  background: rgba(255,255,255,0.2);
  outline: none;
  color: #fff;
  font-size: 14px;
}

select option {
  color: #000;
}

button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 25px;
  background: linear-gradient(135deg, #2563eb, #38bdf8);
  color: white;
  font-weight: bold;
  cursor: pointer;
  margin-top: 15px;
  transition: 0.3s;
  font-size: 16px;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(37, 99, 235, 0.6);
}
.right {
  width: 55%;
  background: url("Images/login image.jpeg") center/cover no-repeat;
  position: relative;
}

.overlay {
  position: absolute;
  inset: 0;
  background: linear-gradient(to top, rgba(37, 99, 235,0.3), rgba(147,197,253,0.1));
}
.card-info {
  position: absolute;
  bottom: 30px;
  left: 30px;
  background: linear-gradient(135deg, #2563eb, #7c3aed);
  color: #fff;
  padding: 20px;
  border-radius: 15px;
  width: 220px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.3);
  transition: 0.3s;
}

.card-info:hover {
  transform: translateY(-5px) scale(1.05);
}

.card-info h4 {
  margin-bottom: 5px;
  font-size: 16px;
}

.card-info p {
  font-size: 14px;
}

</style>
</head>

<body>
<header class="topbar">
  <a href="index.html" class="logo"><i class="fas fa-globe"></i> IncomeVerse</a>
  <a class="home-link" href="index.html">Back to Home</a>
</header>
<div class="main-box">
  <div class="left">
    <div class="logo">Sign In </div>
    <h2>Welcome Back</h2>
    <p>Sign in to continue your incomeVerse Journey</p>

    <div class="input-box">
      <input type="password" placeholder="Password">
    </div>

    <div class="input-box">
      <input type="email" placeholder="Email Address/Number">
    </div>

    <div class="input-box">
      <select>
        <option>Select Your Interest</option>
        <option>Freelancing</option>
        <option>Video Editing</option>
        <option>AI Tools</option>
        <option>Social Media</option>
        <option>Teaching</option>
        <option>Trading</option>
      </select>
    </div>

    <a href="Income_Path.html">
      <button><i class="fa-solid fa-rocket"></i>Sign In Now</button>
    </a>
  </div>
  <div class="right">
    <div class="overlay"></div>

    <div class="card-info">
      <h4><i class="fa-solid fa-coins"></i> Income Potential</h4>
      <p>From zero to paid projects with guided learning paths.</p>
    </div>
  </div>

</div>

</body>
</html>
