<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>3D Rotating Cards</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{ box-sizing:border-box; }
body{
margin:0;
padding-top:80px;
min-height:100vh;
background:linear-gradient(135deg,#0f0f1a,#1c1c2e);
overflow-x:hidden;
font-family:Arial;
}

.cards-stage{
width:100%;
min-height:calc(100vh - 80px);
display:flex;
justify-content:center;
align-items:center;
}

.scene{
width:300px;
height:300px;
perspective:1000px;
}

.carousel{
width:100%;
height:100%;
position:relative;
transform-style:preserve-3d;
animation:rotate 15s linear infinite;
}

.card{
position:absolute;
width:220px;
height:300px;
left:40px;
top:0;
border-radius:15px;
color:white;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
box-shadow:0 0 20px rgba(0,0,0,0.6);
background-size:cover;
background-position:center;
overflow:hidden;
}
.graphic{ background-image:url("https://images.pexels.com/photos/196644/pexels-photo-196644.jpeg?auto=compress&cs=tinysrgb&w=600"); } 
.webdev{ background-image:url("https://images.pexels.com/photos/6801648/pexels-photo-6801648.jpeg?auto=compress&cs=tinysrgb&w=600"); } 
.video{ background-image:url("https://images.pexels.com/photos/2510428/pexels-photo-2510428.jpeg?auto=compress&cs=tinysrgb&w=600"); } 
.content{ background-image:url("https://images.pexels.com/photos/4050291/pexels-photo-4050291.jpeg?auto=compress&cs=tinysrgb&w=600"); } 
.social{ background-image:url("https://images.pexels.com/photos/267350/pexels-photo-267350.jpeg?auto=compress&cs=tinysrgb&w=600"); } 
.ai{ background-image:url("https://images.pexels.com/photos/8386434/pexels-photo-8386434.jpeg?auto=compress&cs=tinysrgb&w=600"); } 
.tutor{ background-image:url("https://images.pexels.com/photos/5905709/pexels-photo-5905709.jpeg?auto=compress&cs=tinysrgb&w=600"); }

.card span{
background:rgba(0,0,0,0.6);
padding:10px 14px;
border-radius:10px;
font-weight:bold;
}

.card:nth-child(1){ transform:rotateY(0deg) translateZ(400px); }
.card:nth-child(2){ transform:rotateY(51.42deg) translateZ(400px); }
.card:nth-child(3){ transform:rotateY(102.84deg) translateZ(400px); }
.card:nth-child(4){ transform:rotateY(154.26deg) translateZ(400px); }
.card:nth-child(5){ transform:rotateY(205.68deg) translateZ(400px); }
.card:nth-child(6){ transform:rotateY(257.1deg) translateZ(400px); }
.card:nth-child(7){ transform:rotateY(308.52deg) translateZ(400px); }

@keyframes rotate{
from{ transform:rotateY(0deg); }
to{ transform:rotateY(360deg); }
}
nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 5%;
            background: rgba(0, 0, 0, 0.75); 
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.5);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logo { 
            font-size: 26px; 
            font-weight: 800; 
            color: #ffffff; 
            text-decoration: none; 
            display: flex; 
            align-items: center; 
        }
        .logo i { color: #007bff; margin-right: 8px; } 
        .nav-links {
            display: flex;
            align-items: center;
        }
        .auth-buttons {
            display: flex;
            align-items: center;
        }
        .signup-link {
            text-decoration: none;
        }

        .nav-links a {
            text-decoration: none;
            color: #dddddd;
            margin: 0 6px;
            padding: 8px 14px;
            border-radius: 999px;
            white-space: nowrap;
            font-weight: 600;
            letter-spacing: 0.2px;
            transition: 0.3s;
        }
        .nav-links a:hover {
            color: #007bff;
            background: rgba(0, 123, 255, 0.12);
        }
        .auth-buttons .login { 
            text-decoration: none; 
            color: #ffffff; 
            margin-right: 20px; 
            font-weight: 600; 
        }
        .auth-buttons .signup-btn { 
            background: #007bff; 
            color: white; 
            padding: 12px 28px; 
            border-radius: 30px; 
            border: none; 
            font-weight: 600; 
            cursor: pointer; 
            transition: 0.3s; 
        }
        .auth-buttons .signup-btn:hover { 
            background: #0056b3; 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(0, 123, 255, 0.4);
        }
        .hero {
            position: relative;
            height: 100vh;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            overflow: hidden;
        }

        #bgVideo {
            position: absolute;
            top: 50%;
            left: 50%;
            min-width: 100%;
            min-height: 100%;
            width: auto;
            height: auto;
            z-index: -1;
            transform: translate(-50%, -50%);
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 100%;
            background: linear-gradient(to bottom, rgba(0,0,0,0.7), rgba(0,0,0,0.4));
            z-index: 0;
        }

        .content {
            position: relative;
            z-index: 1;
            text-align: center;
            max-width: 850px;
            padding: 0 20px;
        }

        .content h1 { 
            font-size: 4rem; 
            line-height: 1.1; 
            margin-bottom: 20px; 
            text-shadow: 2px 2px 15px rgba(0,0,0,0.7); 
        }
        .content p { 
            font-size: 1.3rem; 
            margin-bottom: 40px; 
            font-weight: 300; 
            color: #eeeeee;
        }
        .search-container {
            background: white;
            padding: 6px;
            border-radius: 50px;
            display: flex;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .search-container input { 
            border: none; 
            flex: 1; 
            padding: 15px 30px; 
            border-radius: 50px; 
            font-size: 18px; 
            outline: none; 
            color: #333; 
        }
        .search-container button { 
            background: #007bff; 
            color: white; 
            border: none; 
            padding: 0 35px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-size: 18px; 
            font-weight: 600; 
            transition: 0.3s;
        }
        .search-container button:hover { background: #0056b3; }
        .badges { 
            margin-top: 40px; 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            opacity: 0.9; 
            flex-wrap: wrap; 
        }
        .badges span { 
            background: rgba(255,255,255,0.1); 
            padding: 8px 18px; 
            border-radius: 20px; 
            font-size: 14px; 
            border: 1px solid rgba(255,255,255,0.2); 
            backdrop-filter: blur(5px); 
            color: #fff;
        }
        .badges span i { color: #007bff; }
        
        /* Footer Styles */
        .upwork-footer {
            background-color: #ffffff; 
            color: #000000; 
            padding: 100px 0 50px 0; 
            border-top: 1px solid #e4ebe4;
        }

        .footer-container {
            max-width: 1400px; 
            margin: 0 auto;
            padding: 0 30px;
        }

        .footer-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 50px;
            margin-bottom: 70px;
        }

        .footer-col h3 {
            font-size: 22px; 
            font-weight: 800;
            margin-bottom: 35px;
            color: #0073e6;
        }

        .footer-col ul {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .footer-col ul li {
            margin-bottom: 18px; 
        }

        .footer-col ul li a {
            color: #333333; 
            text-decoration: none;
            font-size: 18px; 
            font-weight: 500;
            transition: 0.2s;
        }

        .footer-col ul li a:hover {
            text-decoration: underline;
            text-decoration-color: #000000; 
            color: #000000; 
        }

        .social-app-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-bottom: 40px;
        }

        .social-links, .mobile-apps {
            display: flex;
            align-items: center;
            gap: 25px;
            font-size: 18px; 
            font-weight: 600;
        }

        .icon-circle {
            width: 45px; 
            height: 45px;
            border: 2px solid #000000; 
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #000000;
            text-decoration: none;
            font-size: 20px; 
            transition: all 0.3s ease;
        }

        .icon-circle:hover {
            background-color: #000000;
            color: #ffffff;
        }

        .footer-divider {
            height: 2px; 
            background-color: #eeeeee;
            margin-bottom: 40px;
        }

        .footer-bottom {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .legal-links {
            display: flex;
            flex-wrap: wrap;
            gap: 30px;
            font-size: 16px; 
            align-items: center;
        }

        .legal-links a {
            color: #333333;
            text-decoration: none;
        }

        .legal-links a:hover {
            color: #000000;
            text-decoration: underline;
        }

        .copyright {
            font-size: 16px;
            color: #333333;
            margin: 0;
            font-weight: 500;
        }

        .privacy-toggle {
            background: #0073e6;
            color: #ffffff;
            padding: 3px 10px;
            border-radius: 15px;
            font-size: 14px;
            margin-left: 10px;
        }

        @media (max-width: 992px) {
            .footer-grid { grid-template-columns: 1fr 1fr; }
        }

        @media (max-width: 768px) {
            .content h1 { font-size: 2.5rem; }
            .nav-links { display: none; }
        }

        @media (max-width: 600px) {
            .footer-grid { grid-template-columns: 1fr; }
            .social-app-bar { flex-direction: column; align-items: flex-start; gap: 35px; }
        }


        .iv-footer {
            background: linear-gradient(160deg, #05070f 0%, #0c1327 55%, #101a33 100%);
            color: #d9e4ff;
            padding: 56px 8% 26px;
            border-top: 1px solid rgba(255, 255, 255, 0.12);
            margin-top: 60px;
        }

        .iv-footer-grid {
            display: grid;
            grid-template-columns: repeat(4, minmax(160px, 1fr));
            gap: 24px;
            margin-bottom: 28px;
        }

        .iv-footer-brand {
            font-size: 22px;
            font-weight: 800;
            color: #ffffff;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            margin-bottom: 12px;
        }

        .iv-footer-brand i {
            margin-right: 8px;
            color: #3b82f6;
        }

        .iv-footer-col h4 {
            color: #ffffff;
            margin: 0 0 12px;
            font-size: 17px;
        }

        .iv-footer-col a,
        .iv-footer-col p {
            color: #c4d2f7;
            text-decoration: none;
            display: block;
            margin: 8px 0;
            font-size: 14px;
            line-height: 1.6;
        }

        .iv-footer-col a:hover {
            color: #7fb3ff;
        }

        .iv-footer-divider {
            height: 1px;
            background: rgba(255, 255, 255, 0.14);
            margin: 12px 0 18px;
        }

        .iv-footer-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
            font-size: 13px;
            color: #9fb2e4;
        }

        .iv-footer-social {
            display: inline-flex;
            gap: 10px;
        }

        .iv-footer-social a {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: #d9e4ff;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            transition: 0.25s;
        }

        .iv-footer-social a:hover {
            border-color: #60a5fa;
            color: #60a5fa;
            transform: translateY(-2px);
        }

        @media (max-width: 920px) {
            .iv-footer-grid {
                grid-template-columns: repeat(2, minmax(140px, 1fr));
            }
        }

        @media (max-width: 560px) {
            .iv-footer-grid {
                grid-template-columns: 1fr;
            }
        }
</style>
</head>
